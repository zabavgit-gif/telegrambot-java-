# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Java CI with Maven

on:
  push:
    branches: [ "main", "JRTB-0" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Настраиваем Java 21 (у тебя в pom.xml указана версия 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Собираем проект. Если pom.xml лежит прямо в корне, оставляем просто mvn clean package
    # Если он лежит в подпапке, то вместо "." укажи имя папки, например "${{ github.workspace }}/имя_папки"
    # Но обычно он в корне, так что добавим явное указание пути к рабочей директории:
    - name: Build with Maven
      run: mvn -B clean package
      working-directory: .
