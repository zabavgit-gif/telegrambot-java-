name: Java CI with Maven

on:
  push:
    branches: [ "main", "JRTB-0" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven


    - name: Build with Maven
      run: mvn -B clean package
      working-directory: .
